<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Title of your game -->
    <title>KFS Aranoid pro Kubu</title>

    <!-- Mobile-friendly scaling -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                   minimum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- Prevent iOS “double tap to zoom” -->
    <meta name="touch-action" content="none">

    <!-- Allow fullscreen on iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS app icon -->
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <!-- Disable blue highlight on tap -->
    <style>
        * {
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            width: 100%;
            height: 100%;
            touch-action: none; /* prevent scrolling */
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
<canvas id="canvas"></canvas>

<script>
    async function start() {
        main()
    }

    window.addEventListener("load", start);
    document.addEventListener("gesturestart", e => e.preventDefault());
    document.addEventListener("gesturechange", e => e.preventDefault());
    document.addEventListener("gestureend", e => e.preventDefault());

    document.addEventListener("touchmove", e => e.preventDefault(), {passive: false});

    function resizeCanvas() {
        const canvas = document.getElementById("canvas");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
</script>
<script type="text/javascript" charset="utf-8" src="app.js"></script>
</body>
</html>
