<svg
        viewBox="0 0 200 200"
        xmlns="http://www.w3.org/2000/svg"
        xmlns:xlink="http://www.w3.org/1999/xlink"
>
    <style>
        .box { fill: #A0A100; stroke: #cccccc; stroke-width: 2; }
        .ribbon { fill: #c30000; }
    </style>

    <!-- Box body -->
    <rect class="box" x="40" y="80" width="120" height="80" rx="4" ry="4" />

    <!-- Box top -->
    <rect class="box" x="35" y="60" width="130" height="30" rx="3" ry="3" />

    <!-- Vertical ribbon -->
    <rect class="ribbon" x="95" y="60" width="10" height="100" />

    <!-- Horizontal ribbon -->
    <rect class="ribbon" x="35" y="95" width="130" height="10" />

    <!-- Ribbon bow -->
    <path class="ribbon" d="M100 60
    C 80 40, 60 40, 60 60
    C 60 80, 80 80, 100 60 Z
    M100 60
    C 120 40, 140 40, 140 60
    C 140 80, 120 80, 100 60 Z" />

</svg>
