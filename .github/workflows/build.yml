name: Build & Release TeaVM

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build TeaVM web version
        run: ./gradlew teavm:build

      - name: Package webapp
        run: |
          cd teavm/build/dist/webapp
          tar -czf ../../../../arkanoid-web.tar.gz --exclude='WEB-INF' .

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          files: arkanoid-web.tar.gz
          make_latest: true

      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key -P ${{ secrets.DEPLOY_PORT }} arkanoid-web.tar.gz ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            mkdir -p ~/www/kuba/gm005 &&
            rm -rf ~/www/kuba/gm005/* &&
            tar -xzf /tmp/arkanoid-web.tar.gz -C ~/www/kuba/gm005 &&
            rm -f /tmp/arkanoid-web.tar.gz
          '
